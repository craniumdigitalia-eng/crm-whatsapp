<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <defs>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="#A78BFA" opacity="0.55"></circle>
    </pattern>
  </defs>
  <rect width="800" height="800" fill="#1A0A2E"></rect>
  <rect width="800" height="800" fill="url(#dots)"></rect>
  
  <g stroke="#7C3AED" stroke-width="0.6" opacity="0.5">
    <line x1="80" y1="120" x2="320" y2="280"></line>
    <line x1="320" y1="280" x2="600" y2="180"></line>
    <line x1="600" y1="180" x2="720" y2="400"></line>
    <line x1="320" y1="280" x2="400" y2="520"></line>
    <line x1="400" y1="520" x2="160" y2="640"></line>
    <line x1="400" y1="520" x2="640" y2="600"></line>
    <line x1="160" y1="640" x2="80" y2="120"></line>
    <line x1="720" y1="400" x2="640" y2="600"></line>
  </g>
  <g fill="#7C3AED">
    <circle cx="80" cy="120" r="3"></circle>
    <circle cx="320" cy="280" r="4"></circle>
    <circle cx="600" cy="180" r="3"></circle>
    <circle cx="720" cy="400" r="3"></circle>
    <circle cx="400" cy="520" r="5"></circle>
    <circle cx="160" cy="640" r="3"></circle>
    <circle cx="640" cy="600" r="3"></circle>
  </g>
</svg>